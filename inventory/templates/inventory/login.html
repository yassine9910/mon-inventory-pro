<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | InventoryPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #f8f9fa url("{% static '66d61241ab0dc7c83a0ab2de_Inventaire-2.png' %}") no-repeat center center fixed;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 0 15px;
    }
    .login-card {
      max-width: 400px;
      width: 100%;
      margin: 20px auto;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      background-color: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
    }
    .btn {
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="login-card card">
      <div class="card-header text-center bg-primary text-white">
        <h4 class="mb-0">🔑 Login to InventoryPro</h4>
      </div>
      <div class="card-body">
        <form method="POST" novalidate>
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-3">
              <label class="form-label">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}
                <div class="text-danger small">{{ field.errors }}</div>
              {% endif %}
            </div>
          {% endfor %}
          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
      </div>
      <div class="card-footer text-center">
        <p class="mb-0">Don't have an account?
          <a href="{% url 'signup' %}" class="fw-bold">Sign up here</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
